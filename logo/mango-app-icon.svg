<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F1C"/>
      <stop offset="100%" style="stop-color:#E8572A"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EC4B6"/>
      <stop offset="100%" style="stop-color:#1A9E92"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>
  
  <!-- Rounded rectangle background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  
  <!-- Mango fruit body (white/cream) -->
  <ellipse cx="248" cy="280" rx="150" ry="175" fill="#FFF8F0" transform="rotate(-15, 248, 280)" opacity="0.95"/>
  
  <!-- Mango inner highlight -->
  <ellipse cx="210" cy="230" rx="60" ry="88" fill="rgba(255,255,255,0.4)" transform="rotate(-15, 210, 230)"/>
  
  <!-- Stem -->
  <path d="M 320 112 Q 335 80 355 60" stroke="#FFF8F0" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Leaf -->
  <path d="M 355 60 Q 420 20 450 70 Q 420 85 355 60 Z" fill="url(#leafGrad)"/>
  <!-- Leaf vein -->
  <path d="M 362 62 Q 400 45 438 68" stroke="rgba(255,255,255,0.35)" stroke-width="4" fill="none"/>
</svg>

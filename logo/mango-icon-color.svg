<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="mangoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFBF69"/>
      <stop offset="50%" style="stop-color:#FF9F1C"/>
      <stop offset="100%" style="stop-color:#E8572A"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EC4B6"/>
      <stop offset="100%" style="stop-color:#1A9E92"/>
    </linearGradient>
  </defs>
  
  <!-- Mango fruit body -->
  <ellipse cx="58" cy="66" rx="38" ry="44" fill="url(#mangoGrad)" transform="rotate(-15, 58, 66)"/>
  
  <!-- Mango highlight -->
  <ellipse cx="46" cy="52" rx="15" ry="22" fill="rgba(255,255,255,0.2)" transform="rotate(-15, 46, 52)"/>
  
  <!-- Stem -->
  <path d="M 76 26 Q 80 18 86 13" stroke="#8B6914" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  
  <!-- Leaf -->
  <path d="M 86 13 Q 106 4 114 16 Q 104 20 86 13 Z" fill="url(#leafGrad)"/>
  <!-- Leaf vein -->
  <path d="M 88 13.5 Q 99 10 108 15" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" fill="none"/>
</svg>
